<section class="flex flex-col gap-4">
  <div>
    <h2 class="text-2xl font-bold mb-2">Buscar GIFs</h2>
    <h3 class="text-sm text-gray-500">
      Busca GIFs por nombre, etiquetas o descripción.
    </h3>
  </div>

  <input type="text" placeholder="Buscar GIFs..."
    class="w-full mt-2 border border-gray-300 rounded-md p-2 outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
    (keyup.enter)="onSearch(txtSearch.value)"
    #txtSearch
  />
</section>

<!-- mostraremos los gifs (resultados de la busqueda) -->
<section class="grid">
  <div class="py-5">
    <gif-list [gifs]="gifs()" />
  </div>
</section>
